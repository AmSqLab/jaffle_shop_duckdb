version: 2

models:
  - name: int_customer_metrics
    description: |
      結合訂單與付款分析的綜合客戶指標中間層。
      
      **🎯 Demo 目的**：展示中間層最佳實務：
      - 從最終數據集市中分離複雜商業邏輯
      - 可重用的模組化轉換
      - 使用 Jinja 的動態欄位生成
      - 多源資料整合
      
      此模型作為客戶分群與分析的基礎。
      
    data_tests:
      # 為確保 demo 穩定性移除行數測試
      # 可根據實際資料取消註解並調整範圍
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 50
            max_value: 110

    columns:
      - name: customer_id
        description: 客戶唯一識別碼 - 主鍵
        data_tests:
          - unique
          - not_null

      - name: total_orders
        description: 客戶總訂單數量
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 10

      - name: first_order_date
        description: 客戶首次訂單日期

      - name: most_recent_order_date
        description: 客戶最近一次訂單日期

      - name: customer_lifespan_days
        description: 首次與最近訂單間的天數
        data_tests:
          - not_null

      - name: days_since_last_order
        description: 自客戶最近一次訂單以來的天數
        data_tests:
          - not_null

      - name: avg_orders_per_month
        description: 每月平均訂單頻率
        data_tests:
          - not_null

      - name: total_payment_amount
        description: 客戶所有訂單的總付款金額
        data_tests:
          - not_null

      - name: avg_order_value
        description: 此客戶的平均訂單金額
        data_tests:
          - not_null

      - name: return_rate_percent
        description: 訂單退貨的百分比
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

      - name: payment_completion_rate_percent
        description: 接受付款的訂單百分比
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

      - name: payment_methods_used
        description: 客戶使用的不同付款方式數量
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 4

  - name: int_order_analytics
    description: |
      具備商業情境強化與客戶旅程洞察的訂單層級分析。
      
      **🎯 Demo 目的**：展示訂單強化模式：
      - 用於客戶情境的視窗函數
      - 多維度訂單分類
      - 時間序列分析準備
      - 商業規則應用
      
      此模型為進階分析和報告準備訂單資料。

    data_tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('stg_orders')

    columns:
      - name: order_id
        description: 訂單唯一識別碼 - 主鍵
        data_tests:
          - unique
          - not_null

      - name: customer_id
        description: 下此訂單的客戶
        data_tests:
          - not_null

      - name: order_date
        description: When the order was placed
        data_tests:
          - not_null

      - name: status
        description: Current order fulfillment status
        data_tests:
          - not_null

      - name: total_amount
        description: Total order amount including all payments
        data_tests:
          - not_null

      - name: customer_order_sequence
        description: Sequential order number for this customer (1 = first order)
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 6

      - name: customer_total_orders
        description: Total number of orders by this customer
        data_tests:
          - not_null

      - name: order_customer_journey_stage
        description: Customer journey classification for this order
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['First Order', 'Latest Order', 'Early Order', 'Repeat Order']

      - name: order_value_tier
        description: Value-based order classification
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['High Value', 'Medium Value', 'Standard Value']

      - name: payment_complexity
        description: Payment method complexity classification
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['Simple Payment', 'Dual Payment', 'Complex Payment']

      - name: order_day_type
        description: Weekday vs weekend classification
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['Weekday', 'Weekend']

      - name: reorder_velocity
        description: Speed of reorder based on time since previous order
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['First Order', 'Quick Reorder', 'Regular Reorder', 'Slow Reorder', 'Long Gap Reorder']

      - name: order_outcome
        description: Business success classification
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['Successful', 'Problematic', 'Unpaid', 'In Progress']

      - name: order_analytics_key
        description: Business surrogate key for order analytics
        data_tests:
          - unique
          - not_null
